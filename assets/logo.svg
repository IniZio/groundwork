  <!-- Foundation blocks - bottom layer -->
  <rect x="48" y="168" width="160" height="24" rx="4" fill="#e94560"/>
  <rect x="48" y="168" width="160" height="24" rx="4" fill="url(#glow)" opacity="0.3"/>
  
  <!-- Middle layer blocks -->
  <rect x="72" y="132" width="48" height="28" rx="4" fill="#0f3460"/>
  <rect x="136" y="132" width="48" height="28" rx="4" fill="#0f3460"/>
  
  <!-- Top layer block -->
